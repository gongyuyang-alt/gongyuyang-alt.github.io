research_question: >-
  How can LLM-based systems preserve the developer's intended behavior when models
  consume instructions, documents, web content, and tool outputs from sources that
  may be malicious or simply unreliable?

research_themes:
  - number: "01"
    title: "Prompt injection defense"
    text: >-
      I develop alignment methods that generalize beyond a fixed catalog of attacks.
      LocalAlign trains against near-but-wrong responses, tightening the model's
      robustness boundary around the intended behavior.
    paper: "LocalAlign"
  - number: "02"
    title: "RAG manipulation at scale"
    text: >-
      I study how poisoned documents can shift generated opinions across related
      queries and broader discourse, moving from isolated failures toward realistic,
      system-level threat models.
    paper: "Topic-FlipRAG · DiscourseFlip"
  - number: "03"
    title: "Black-box adversarial retrieval"
    text: >-
      I investigate attacks under practical constraints, where the adversary cannot
      inspect the retriever or the LLM and must reason from end-to-end system outputs.
    paper: "FlippedRAG"

research_arc:
  - year: "2025"
    label: "Expose"
    title: "From retrieval poisoning to opinion manipulation"
    text: "FlippedRAG and Topic-FlipRAG reveal practical black-box attack surfaces in RAG pipelines."
  - year: "2026"
    label: "Scale"
    title: "From topics to discourse-level influence"
    text: "DiscourseFlip models coordinated influence across a semantic network of queries."
  - year: "2026 →"
    label: "Defend"
    title: "From cataloged attacks to generalizable robustness"
    text: "LocalAlign shifts the focus toward prompt injection defenses that hold under adaptive, near-target attacks."

