headline: "Building AI systems that remain reliable when instructions and retrieved content cannot be trusted."
intro: >-
  I study prompt injection and the security of retrieval-augmented generation systems.
  My work examines how untrusted external content can steer model behavior, and how
  alignment and system design can make LLM applications more robust.
availability: "Open to research conversations and collaborations."

